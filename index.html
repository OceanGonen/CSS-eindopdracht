<script>
  const body = document.body;
 
  const planet = document.querySelector('figure');
  const speedButtons = document.querySelectorAll('input[name="speed"]');
  
  let rotation = 0;
  let moveStep = 1;

  function updateSteering() {
    body.style.setProperty('--steer', rotation + 'deg');
    body.style.setProperty('--steer-n', (rotation / 100));
    requestAnimationFrame(updateSteering);
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') rotation -= moveStep;
    if (e.key === 'ArrowRight') rotation += moveStep;
    rotation = Math.max(-60, Math.min(60, rotation));
  });

  window.addEventListener('keyup', () => {
    const center = setInterval(() => {
      if (rotation > 0) rotation -= 1;
      else if (rotation < 0) rotation += 1;
      if (Math.abs(rotation) <= 1) {
        rotation = 0;
        clearInterval(center);
      }
    }, 20);
  });

  updateSteering();

 
</script>
